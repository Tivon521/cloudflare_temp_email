name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Deploy Backend for ${{ github.ref_name }}
        run: |
          export use_worker_assets=${{ secrets.USE_WORKER_ASSETS }}
          export use_worker_assets_with_telegram=${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
          
          if [ -n "$use_worker_assets" ]; then
            cd frontend/
            pnpm install --no-frozen-lockfile
            if [ -n "$use_worker_assets_with_telegram" ]; then
              echo "Building with telegram pages"
              pnpm build:telegram:pages
            else
              echo "Building with normal pages"
              pnpm build:pages
            fi
            cd ..
          fi

          export debug_mode=${{ secrets.DEBUG_MODE }}
          export use_mail_wasm_parser=${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}
          
          cd worker/
          # ✅ 修复核心：使用环境变量写入，避免 Shell 解析特殊字符
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml

          # 强制禁用默认地址前缀，避免 secret 里的旧 PREFIX 配置继续生效
          if grep -qE '^PREFIX\s*=' wrangler.toml; then
            sed -i 's/^PREFIX\s*=.*/PREFIX = ""/' wrangler.toml
          else
            printf '\nPREFIX = ""\n' >> wrangler.toml
          fi

          pnpm install --no-frozen-lockfile

          if [ -n "$use_mail_wasm_parser" ]; then
            echo "Using mail-parser-wasm-worker"
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
            echo "Applied mail-parser-wasm-worker patch"
          fi

          if [ "$debug_mode" = "true" ]; then
            pnpm run deploy
          else
            if pnpm run deploy; then
              echo "Deploy succeeded"
            else
              code=$?
              echo "Command failed with exit code $code"
              echo "--- wrangler.toml (sanitized) ---"
              sed -E '/JWT_SECRET|ADMIN_PASSWORDS|PASSWORDS|RESEND_TOKEN|CLOUDFLARE_API_TOKEN|BOT_TOKEN|SECRET|TOKEN/d' wrangler.toml || true
              echo "--- end wrangler.toml ---"
              exit "$code"
            fi
          fi

          # Wrangler 当前 token 缺少 KV write 权限，因此部署后使用 Cloudflare API 自动补齐 KV 绑定
          if [ -n "$CF_GLOBAL_EMAIL" ] && [ -n "$CF_GLOBAL_KEY" ]; then
            node -e '
            const https = require("https");

            const email = process.env.CF_GLOBAL_EMAIL;
            const key = process.env.CF_GLOBAL_KEY;
            const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
            const script = "cloudflare_temp_email";
            const kvId = "a480c7e04d4f4d458f51774155876456";

            function api(path, method="GET", headers={}, body=null) {
              return new Promise((resolve, reject) => {
                const req = https.request({
                  hostname: "api.cloudflare.com",
                  path,
                  method,
                  headers: {
                    "X-Auth-Email": email,
                    "X-Auth-Key": key,
                    ...headers,
                  },
                }, (res) => {
                  const bufs = [];
                  res.on("data", d => bufs.push(d));
                  res.on("end", () => resolve({
                    status: res.statusCode,
                    headers: res.headers,
                    body: Buffer.concat(bufs),
                  }));
                });
                req.on("error", reject);
                if (body) req.write(body);
                req.end();
              });
            }

            function parseMultipart(body, contentType) {
              const m = /boundary=([^;]+)/i.exec(contentType || "");
              if (!m) throw new Error("No multipart boundary found");
              const boundary = "--" + m[1];
              const raw = body.toString("binary");
              const chunks = raw.split(boundary).slice(1, -1);
              return chunks.map((chunk) => {
                let c = chunk;
                if (c.startsWith("\r\n")) c = c.slice(2);
                if (c.endsWith("\r\n")) c = c.slice(0, -2);
                const idx = c.indexOf("\r\n\r\n");
                const rawHeaders = c.slice(0, idx);
                const contentBin = c.slice(idx + 4);
                const headers = {};
                for (const line of rawHeaders.split("\r\n")) {
                  const j = line.indexOf(":");
                  if (j > -1) headers[line.slice(0, j).toLowerCase()] = line.slice(j + 1).trim();
                }
                const cd = headers["content-disposition"] || "";
                const nameMatch = /name="([^"]+)"/.exec(cd);
                return {
                  name: nameMatch ? nameMatch[1] : null,
                  buf: Buffer.from(contentBin, "binary"),
                };
              });
            }

            function buildMultipart(parts) {
              const boundary = "----openclaw" + Math.random().toString(16).slice(2);
              const bufs = [];
              for (const part of parts) {
                bufs.push(Buffer.from(`--${boundary}\r\n`));
                let header = `Content-Disposition: form-data; name="${part.name}"; filename="${part.filename || part.name.replace(/^\.\//,"")}"\r\n`;
                if (part.contentType) header += `Content-Type: ${part.contentType}\r\n`;
                header += "\r\n";
                bufs.push(Buffer.from(header));
                bufs.push(part.data);
                bufs.push(Buffer.from("\r\n"));
              }
              bufs.push(Buffer.from(`--${boundary}--\r\n`));
              return { boundary, body: Buffer.concat(bufs) };
            }

            (async () => {
              const settingsRes = await api(`/client/v4/accounts/${accountId}/workers/scripts/${script}/settings`);
              const settings = JSON.parse(settingsRes.body.toString("utf8"));
              if (!settings.success) throw new Error(`Failed to fetch settings: ${settingsRes.body.toString("utf8")}`);
              const hasKv = (settings.result?.bindings || []).some((b) => b.name === "KV");
              if (hasKv) {
                console.log("KV binding already present, skipping patch");
                process.exit(0);
              }

              const current = await api(`/client/v4/accounts/${accountId}/workers/scripts/${script}`);
              if (current.status !== 200) throw new Error(`Failed to fetch current worker: ${current.status}`);
              const files = parseMultipart(current.body, current.headers["content-type"]);

              const s = settings.result;
              const bindings = [
                ...(s.bindings || []).filter((b) => b.name !== "KV"),
                { type: "kv_namespace", name: "KV", namespace_id: kvId },
              ];

              const metadata = {
                main_module: "worker.js",
                bindings,
                compatibility_date: s.compatibility_date,
                compatibility_flags: s.compatibility_flags || [],
                usage_model: s.usage_model,
                logpush: s.logpush || false,
                tags: s.tags || [],
                tail_consumers: s.tail_consumers || [],
                placement: s.placement || {},
              };

              const upload = buildMultipart([
                { name: "metadata", filename: "metadata.json", contentType: "application/json", data: Buffer.from(JSON.stringify(metadata), "utf8") },
                ...files.map((f) => ({
                  name: f.name,
                  filename: f.name.replace(/^\.\//, ""),
                  contentType: f.name.endsWith(".wasm") ? "application/wasm" : "application/javascript+module",
                  data: f.buf,
                })),
              ]);

              const put = await api(`/client/v4/accounts/${accountId}/workers/scripts/${script}`, "PUT", {
                "Content-Type": `multipart/form-data; boundary=${upload.boundary}`,
                "Content-Length": upload.body.length,
              }, upload.body);

              const result = JSON.parse(put.body.toString("utf8"));
              if (!result.success) throw new Error(`Failed to patch KV binding: ${put.body.toString("utf8")}`);
              console.log("KV binding patched successfully");
            })().catch((err) => {
              console.error(err.stack || String(err));
              process.exit(1);
            });
            '
          else
            echo "CF_GLOBAL_EMAIL / CF_GLOBAL_KEY not set, skip KV patch"
          fi

          echo "Deployed for tag ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # ✅ 将 secret 映射到环境变量中
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          CF_GLOBAL_EMAIL: ${{ secrets.CF_GLOBAL_EMAIL }}
          CF_GLOBAL_KEY: ${{ secrets.CF_GLOBAL_KEY }}
